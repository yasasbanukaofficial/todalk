name: Todalk
description: "Todalk - voice task manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.4
  record: ^7.1.1
  dio: ^5.7.0
  just_audio: ^0.9.40
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
